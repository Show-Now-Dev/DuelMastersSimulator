<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Card Game Simulator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>Card Game Simulator</h1>
      <!--
        Game-only controls: shown when the board is active, hidden on menu screens.
        Toggled by startGameSimulation() / return-to-menu handler.
      -->
      <div id="header-game-controls" style="display:none">
        <button id="return-to-menu-button" class="btn--return-to-menu">← メニューへ</button>
        <button id="reset-button">リセット</button>
      </div>
    </header>

    <!--
      Pre-game screens: menu, card editor, deck builder.
      Shown before the game board. Hidden by startGameSimulation().
    -->
    <div id="pre-game">
      <div id="screen-menu"         class="screen is-active"></div>
      <div id="screen-card-editor"  class="screen"></div>
      <div id="screen-deck-builder" class="screen"></div>
      <div id="screen-card-manager" class="screen"></div>
      <div id="screen-deck-editor"  class="screen"></div>
    </div>

    <!--
      Game board: zone <section> elements are generated by JS (from ZONE_DEFINITIONS).
      Static elements (card-detail-panel, controls, log-panel) remain here.
    -->
    <main id="layout" class="game-board" style="display:none">

      <!--
        Zone sections are inserted here by the bootstrap script below.
        #card-detail-panel is the grid anchor — zones insert before it.
      -->
      <div id="board-grid">
        <section id="card-detail-panel" class="card-detail-panel"></section>
      </div>

      <div id="board-bottom">
        <aside id="controls">
          <!-- 4 main action buttons in one row -->
          <div class="controls-inline controls-inline--wrap">
            <button id="toggle-tap-button">タップ / アンタップ</button>
            <button id="toggle-face-button">表向き / 裏向き</button>
            <button id="peek-button">見る</button>
            <button id="clear-selection-button">全選択解除</button>
          </div>

          <!-- Hidden: zone move (keep for future optional use) -->
          <div class="controls-inline" style="display:none">
            <!--
              Options are generated from ZONE_DEFINITIONS in the bootstrap script below.
            -->
            <select id="move-target"></select>
            <button id="move-button">移動</button>
          </div>

          <!-- Hidden: stack buttons (keep for future optional use) -->
          <button id="pick-stack-button" style="display:none">①重ねる対象を選ぶ</button>
          <div class="controls-inline controls-inline--split" style="display:none">
            <button id="stack-top-button" disabled>②上に重ねる</button>
            <button id="stack-bottom-button" disabled>②下に重ねる</button>
          </div>
        </aside>

        <div id="log-draw-column">
          <section id="log-panel" class="zone" style="display:none"></section>
          <button id="draw-button" class="ctrl-draw-btn">ドロー</button>
        </div>
      </div>
    </main>

    <!--
      Modal layer: position:fixed, lives outside the board grid.
      Rendered above all game elements without affecting board layout.
    -->
    <div id="modal-layer" role="dialog" aria-modal="true"></div>

    <!-- Touch polyfill: maps touch events to HTML5 drag events on mobile browsers.
         Must load before any drag-and-drop code. Local copy in lib/ — no CDN dependency.
         Source: https://github.com/Bernardo-Castilho/dragdroptouch  License: MIT v1.3.1 -->
    <script src="./lib/DragDropTouch.min.js"></script>

    <!-- Model -->
    <script src="./model/CardDefinition.js"></script>
    <script src="./model/CardInstance.js"></script>
    <script src="./model/CardStack.js"></script>
    <script src="./model/Zone.js"></script>
    <script src="./model/DeckDefinition.js"></script>

    <!-- Core game engine -->
    <script src="./core/GameState.js"></script>
    <script src="./core/actions.js"></script>
    <script src="./core/reducer.js"></script>
    <script src="./engine/GameEngine.js"></script>

    <!-- Parser & storage -->
    <script src="./parser/cardParser.js"></script>
    <script src="./storage/cardStorage.js"></script>

    <!-- Logic -->
    <script src="./logic/deckBuilder.js"></script>
    <script src="./logic/CardRepository.js"></script>
    <script src="./logic/DeckRepository.js"></script>
    <script src="./logic/dataPorter.js"></script>

    <!-- UI: shared utility modules -->
    <script src="./ui/shared/cardSearchUI.js"></script>

    <!-- UI: shared modules (load order matters — each depends on globals above it) -->
    <script src="./ui/uiState.js"></script>
    <script src="./ui/viewModel.js"></script>
    <script src="./ui/logPanel.js"></script>
    <script src="./ui/cardRenderer.js"></script>
    <script src="./ui/zoneRenderer.js"></script>
    <script src="./ui/selectionManager.js"></script>
    <script src="./ui/controlPanel.js"></script>

    <!-- UI: pre-game screens -->
    <script src="./ui/importHelper.js"></script>
    <script src="./ui/cardEditor/cardEditor.js"></script>
    <script src="./ui/deckBuilder/deckBuilderUI.js"></script>
    <script src="./ui/cardManager/cardManagerUI.js"></script>
    <script src="./ui/deckEditor/deckEditorUI.js"></script>
    <script src="./ui/menu/menuUI.js"></script>
    <script src="./ui/ui.js"></script>

    <!-- Bootstrap -->
    <script>
      // Generate zone <section> elements from ZONE_DEFINITIONS.
      // CSS Grid positions them by id-based grid-area — DOM order does not matter.
      (function () {
        var boardGrid = document.getElementById("board-grid");
        var anchor = boardGrid.firstElementChild; // insert before #card-detail-panel
        ZONE_DEFINITIONS.forEach(function (def) {
          var el = document.createElement("section");
          el.id        = def.ui.domId;
          el.className = "zone " + def.ui.cssClass;
          boardGrid.insertBefore(el, anchor);
        });
      }());

      // Populate the move-target <select> from ZONE_DEFINITIONS.
      (function () {
        var select = document.getElementById("move-target");
        ZONE_DEFINITIONS.forEach(function (def) {
          def.ui.moveOptions.forEach(function (opt) {
            var option         = document.createElement("option");
            option.value       = opt.value;
            option.textContent = opt.label;
            select.appendChild(option);
          });
        });
      }());

      MenuUI.init(function (cardDefs, deckInstances) {
        startGameSimulation(cardDefs, deckInstances);
      });
    </script>
  </body>
</html>
