<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Card Game Simulator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>Card Game Simulator</h1>
    </header>

    <main id="layout" class="game-board">
      <section id="zone-battlefield" class="zone zone--spread"></section>
      <section id="zone-stack" class="zone compact-zone"></section>

      <section id="zone-shield" class="zone zone--spread"></section>
      <section id="zone-deck" class="zone compact-zone"></section>
      <section id="zone-graveyard" class="zone compact-zone"></section>
      <section id="zone-ex" class="zone compact-zone"></section>
      <section id="zone-gr" class="zone compact-zone"></section>

      <section id="zone-mana" class="zone zone--spread"></section>
      <section id="zone-hand" class="zone zone--spread"></section>

      <aside id="controls">
        <div class="controls-group">
          <button id="draw-button">Draw card</button>
          <button id="shuffle-button">Shuffle deck</button>
          <button id="reset-button">Reset game</button>
        </div>

        <div class="controls-group">
          <label for="move-target">Move selected to</label>
          <div class="controls-inline">
            <select id="move-target">
              <option value="hand">Hand</option>
              <option value="battlefield">Battlefield</option>
              <option value="shield">Shield</option>
              <option value="graveyard">Graveyard</option>
              <option value="mana">Mana</option>
              <option value="deck">Deck (top)</option>
            </select>
            <button id="move-button">Move</button>
          </div>
        </div>

        <div class="controls-group">
          <button id="toggle-tap-button">Toggle tap (selected)</button>
          <button id="toggle-face-button">Toggle face (selected)</button>
        </div>

        <div class="controls-group">
          <label>Stack selected cards</label>
          <button id="pick-stack-button">Pick target stack</button>
          <div class="controls-inline">
            <button id="stack-top-button" disabled>Stack on top</button>
            <button id="stack-bottom-button" disabled>Stack on bottom</button>
          </div>
        </div>

        <div id="status-text">Ready.</div>
      </aside>

      <section id="log-panel" class="zone"></section>
    </main>

    <!--
      Modal layer: position:fixed, lives outside the board grid.
      Rendered above all game elements without affecting board layout.
    -->
    <div id="modal-layer" role="dialog" aria-modal="true"></div>

    <script src="./model/CardDefinition.js"></script>
    <script src="./model/CardInstance.js"></script>
    <script src="./model/CardStack.js"></script>
    <script src="./model/Zone.js"></script>
    <script src="./core/GameState.js"></script>
    <script src="./core/actions.js"></script>
    <script src="./core/reducer.js"></script>
    <script src="./engine/GameEngine.js"></script>
    <script src="./ui/uiState.js"></script>
    <script src="./ui/ui.js"></script>
  </body>
</html>
